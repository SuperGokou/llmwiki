# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Deploy: New Blueprint → connnect GitHub repo → select this YAML.
services:
  - type: web
    name: gokou-llmwiki
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      # Ollama 官方云（与 Python SDK：Client(host, headers=Bearer OLLAMA_API_KEY).chat 一致）
      - key: OLLAMA_HOST
        value: https://ollama.com
      # 在 Dashboard → Environment 添加 Secret：OLLAMA_API_KEY（勿提交仓库）
      - key: KNOWLEDGE_MODEL
        value: gpt-oss:120b
      - key: OCR_MODEL
        value: gpt-oss:120b
      - key: CHAT_MODEL
        value: gpt-oss:120b
      # --- 可选：Groq / OpenAI 兼容（须删除上面的 Ollama 独占依赖并在 Dashboard 配置）---
      # LLM_BACKEND=openai
      # OPENAI_API_BASE=https://api.groq.com/openai/v1
      # OPENAI_API_KEY=（Secret）
